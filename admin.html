<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{font-family:sans-serif;padding:20px;max-width:800px;margin:auto;}
    .box{border:1px solid #ccc;padding:20px;border-radius:12px;margin-top:20px;}
    input,textarea{width:100%;padding:8px;margin-top:8px;}
    button{padding:10px 16px;margin-top:12px;cursor:pointer;}
  </style>
</head>
<body>

  <h1>Admin Panel</h1>

  <!-- LOGIN -->
  <div id="loginBox" class="box">
    <h3>Enter Admin Passkey</h3>
    <input type="password" id="passkey" placeholder="Passkey">
    <button onclick="login()">Unlock</button>
  </div>

  <!-- ADMIN BOX -->
  <div id="adminBox" class="box" style="display:none;">
    <h3>Create Blog Post</h3>
    <input id="title" placeholder="Title">
    <textarea id="body" placeholder="Content"></textarea>
    <button onclick="submitPost()">Submit</button>

    <p style="margin-top:20px;color:#777;">
      ✔ When you press submit, a GitHub Action updates your site with the new blog.
    </p>
  </div>


<script>
/* ---------------------------------------------------------------------------------
   PASSKEY LOGIN SYSTEM
-----------------------------------------------------------------------------------*/

// hash of "dhruvhere"
const PASS_HASH = "e66a9c87cba76b27ead2a6254ceb6c2c49aaabb8ca0b1121e86bf60ec53ba32a";

async function sha256(txt){
  const enc = new TextEncoder().encode(txt);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf))
    .map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function login(){
  const val = document.getElementById("passkey").value.trim();
  const hash = await sha256(val);

  if(hash === PASS_HASH){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("adminBox").style.display="block";
  } else {
    alert("Wrong Passkey");
  }
}


/* ---------------------------------------------------------------------------------
   SUBMIT BLOG → SEND TO GITHUB ACTION
-----------------------------------------------------------------------------------*/

async function submitPost(){
  const title = document.getElementById("title").value.trim();
  const body  = document.getElementById("body").value.trim();

  if(!title || !body){
    alert("Fill everything!");
    return;
  }

  const payload = {
    title,
    body,
    timestamp: Date.now()
  };

  await fetch("https://api.github.com/repos/dhruvsaxena314/dhruvsaxena314.github.io/dispatches", {
    method: "POST",
    headers: {
      "Accept": "application/vnd.github+json",
      "Authorization": "Bearer YOUR_API_TOKEN_HERE",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      event_type: "new_blog",
      client_payload: payload
    })
  });

  alert("Blog submitted! Waiting for GitHub to update your site.");
}
</script>

</body>
</html>
